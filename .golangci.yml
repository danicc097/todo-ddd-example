# yaml-language-server: $schema=https://raw.githubusercontent.com/golangci/golangci-lint/refs/tags/v2.8.0/jsonschema/golangci.jsonschema.json

version: "2"
linters:
  default: all
  disable:
    - tparallel
    - funcorder
    - bodyclose
    - dupword
    - noinlineerr
    - err113
    - funlen
    - godox
    - lll
    - mnd
    - nilerr
    - nlreturn
    - noctx
    - nonamedreturns
    - sqlclosecheck
    - ireturn
    - tagalign
    - testpackage
    - thelper
    - unparam
    - wastedassign
    - wsl
    - dogsled
    - gocognit
    - maintidx
    - cyclop
  settings:
    depguard:
      rules:
        domain:
          files:
            - "**/internal/modules/**/domain/*.go"
            - "!**/*_test.go"
          deny:
            - pkg: "github.com/danicc097/todo-ddd-example/internal/modules/*/application"
              desc: "Arch violation: Domain layer cannot depend on the Application layer."
            - pkg: "github.com/danicc097/todo-ddd-example/internal/modules/*/infrastructure"
              desc: "Arch violation: Domain layer cannot depend on the Infrastructure layer."
            - pkg: "github.com/danicc097/todo-ddd-example/internal/infrastructure"
              desc: "Arch violation: Domain layer cannot depend on global Infrastructure."
            - pkg: "github.com/danicc097/todo-ddd-example/internal/generated/db"
              desc: "Arch violation: Domain layer cannot depend on generated DB models."
            - pkg: "github.com/gin-gonic/gin"
              desc: "Arch violation: Domain layer cannot know about HTTP routing."
            - pkg: "github.com/jackc/pgx"
              desc: "Arch violation: Domain layer cannot know about the database."
        application:
          files:
            - "**/internal/modules/**/application/*.go"
            - "!**/*_test.go"
          deny:
            - pkg: "github.com/danicc097/todo-ddd-example/internal/modules/*/infrastructure"
              desc: "Arch violation: Application layer cannot depend on the Infrastructure layer."
            - pkg: "github.com/danicc097/todo-ddd-example/internal/generated/db"
              desc: "Arch violation: Application layer cannot depend on generated DB models (use Domain entities or Application DTOs)."
            - pkg: "github.com/gin-gonic/gin"
              desc: "Arch violation: Application layer cannot know about HTTP routing."
            - pkg: "github.com/jackc/pgx"
              desc: "Arch violation: Application layer cannot know about the database."
        http:
          files:
            - "**/infrastructure/http/*.go"
            - "!**/*_test.go"
          deny:
            - pkg: "github.com/danicc097/todo-ddd-example/internal/generated/db"
              desc: "Arch violation: HTTP handlers cannot depend on generated DB models (use Domain entities or API DTOs)."
    revive:
      rules:
        - name: unused-parameter
          disabled: true
    forbidigo:
      forbid:
        - pattern: ^os\.Getenv$
          msg: "Do not use os.Getenv directly. Use internal.Config instead."
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true
    paralleltest:
      ignore-missing-subtests: true
    errcheck:
      verbose: false # true to see what is needed exactly in exclude-functions
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (*github.com/gin-gonic/gin.Context).Error
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
    exhaustruct:
      include:
        - github.com/danicc097/todo-ddd-example/internal/generated/api.*
        - .*Event
        - .*Args
        - .*DTO
        - github.com/danicc097/todo-ddd-example/internal/generated/db.*Params
      exclude:
        - ".*/testdata/.*"
    ireturn:
      allow:
        - error
        - stdlib
        - go.opentelemetry.io/otel/trace.Span
    lll:
      line-length: 130
    staticcheck:
      checks:
        - all
    exhaustive:
      explicit-exhaustive-switch: true
      default-signifies-exhaustive: false
    tagliatelle:
      case:
        rules:
          json: goCamel
          yaml: goCamel
        use-field-name: true
    varnamelen:
      max-distance: 30
      ignore-names:
        - id
        - ch
        - tx
        - ctx
        - q
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-decls:
        - d db.DBTX
        - c *gin.Context
        - b bytes.Buffer
        - h http.Handler
        - id string
        - ok bool
        - r *http.Request
        - w http.ResponseWriter
    wrapcheck:
      ignore-sigs:
        - internaldomain.WrapErrorf(
        - internaldomain.NewErrorf(
        - internal.NewErrorf(
        - internal.WrapErrorf(
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
        - apperrors.Wrap(
        - apperrors.New(
        - .NewDomainError(
        - .WrapDomainError(
        - .ParseDBError(
      ignore-package-globs:
        - github.com/danicc097/todo-ddd-example/*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: internal/testutil/*
      - linters:
          - godot
          - lll
          - wsl
        path: internal/gen/
      - linters:
          - cyclop
          - err113
          - errcheck
          - errchkjson
          - exhaustruct
          - funlen
          - lll
          - nonamedreturns
          - nosnakecase
          - varnamelen
          - wrapcheck
        path: _test\.go
      - linters:
          - lll
          - revive
          - staticcheck
        path: internal/doc/doc.go
      - linters:
          - cyclop
          - funlen
          - gocognit
          - unparam
        path: cmd/
      - linters:
          - forbidigo
        path: cmd/
      - linters:
          - revive
        path: cmd/internal/repos/postgresql.go
      - linters:
          - lll
        path: internal/memcached/task.go
      - linters:
          - paralleltest
          - thelper
          - tparallel
        path: internal/envvar/envvar_test.go
    paths:
      - .*\.xo\.go$
      - .*\.gen\.go$
      - .*\.pb\.go$
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/danicc097/todo-ddd-example)
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - .*\.xo\.go$
      - .*\.gen\.go$
      - .*\.pb\.go$
      - third_party$
      - builtin$
      - examples$
