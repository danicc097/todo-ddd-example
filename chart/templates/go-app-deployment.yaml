{{- if .Values.goApp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-app
  labels:
    app.kubernetes.io/name: go-app
    app.kubernetes.io/component: api
    {{- include "todo-ddd-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.goApp.replicaCount }}
  strategy:
    {{- toYaml .Values.goApp.strategy | nindent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: go-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go-app
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: go-app
          image: "{{ .Values.goApp.image.repository }}:{{ .Values.goApp.image.tag }}"
          imagePullPolicy: {{ .Values.goApp.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: go-app-config
            - secretRef:
                name: go-app-secret
          volumeMounts:
            - name: jwt-keys
              mountPath: /app/private.pem
              subPath: private.pem
              readOnly: true
            - name: jwt-keys
              mountPath: /app/public.pem
              subPath: public.pem
              readOnly: true
            - name: openapi
              mountPath: /app/openapi.yaml
              subPath: openapi.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.goApp.resources | nindent 12 }}
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
        - name: openapi
          configMap:
            name: openapi-spec
{{- end }}
