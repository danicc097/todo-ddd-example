kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: myapp
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # containerPort 80 → hostPort 8090 via Traefik ingress
    extraPortMappings:
      - containerPort: 80
        hostPort: 8090
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
      - containerPort: 30432
        hostPort: 5732
        protocol: TCP
      - containerPort: 30379
        hostPort: 6379
        protocol: TCP
      - containerPort: 30672
        hostPort: 5672
        protocol: TCP
