name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Generate and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Helm chart
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency update ./chart
          helm lint ./chart
          for f in chart/values*.yaml; do
            echo "Validating with $f..."
            helm template myapp ./chart -f "$f" > /dev/null
          done

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: myapp
          config: k8s/kind-config.yaml

      - name: Deploy Postgres
        run: |
          helm repo list | grep -q "^bitnami\s" || helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update bitnami
          helm dependency update ./chart
          (cd chart/charts && for f in *.tgz; do [ -f "$f" ] && tar xzf "$f" && rm -f "$f"; done)
          helm upgrade --install myapp ./chart \
            -f chart/values-ci-test.yaml \
            --namespace myapp --create-namespace \
            --wait --timeout 5m

      - name: Lint
        run: make lint

      - name: Generate
        run: make gen

      - name: Diff check
        run: |
          git diff --exit-code

      - name: Test
        run: |
          make test-race

  deploy-test:
    name: Deploy and verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FAIL_FAST: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install -g @grafana/openapi-to-k6

      - name: Install dependencies
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Full deployment
        run: |
          HELM_VALUES=chart/values-ci.yaml make deploy

      - name: Smoke test
        run: |
          RESEED=1 make bench SCENARIO=smoke

      - name: E2E
        run: |
          go test -tags e2e -v ./tests/e2e/...

      - name: Verify example flows
        run: |
          make gen-cli
          sudo apt-get install oathtool libpam-oath
          ./scripts/example-flow.sh
          ./scripts/test-idempotency.sh

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n myapp -o wide
          kubectl get events -n myapp --sort-by='.lastTimestamp'
          kubectl logs -n myapp -l app.kubernetes.io/name=go-app --all-containers --tail=100
